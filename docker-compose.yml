services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: folio-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./books:/data/books
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////data/folio.db
      - BOOKS_STORAGE_PATH=/data/books
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: folio-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
